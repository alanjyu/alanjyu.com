<!doctype html>
<html lang="en">

<head>
	<title>Alan Yu - Gallery</title>

	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
	<meta http-equiv="X-UA-Compatible" content="IE=edge" />
	<meta name="author" content="Alan J. Yu" />
	<meta name="description" content="Alan&apos;s personal website. Geoscience and more." />
	<meta prefix="og: https://ogp.me/ns#" property="og:title" content="Alan Yu - Gallery" />
	<meta prefix="og: https://ogp.me/ns#" property="og:url" content="https://alanjyu.com" />
	<meta prefix="og: https://ogp.me/ns#" property="og:description" content=" " />
	<link rel="icon" type="image/png" sizes="32x32" href="/src/img/favicon.ico" />
	<link rel="manifest" href="/src/site.webmanifest" />
	<!-- Set theme early to avoid flashes -->
	<script>
		(() => {
			try {
				const savedTheme = localStorage.getItem('theme');
				const systemDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
				document.documentElement.setAttribute('data-theme', savedTheme || (systemDark ? 'dark' : 'light'));
			} catch {
				document.documentElement.setAttribute('data-theme', 'light');
			}
		})();
	</script>
	<link rel="stylesheet" href="/src/css/gallery.scss" />
</head>

<body>
	<nav class="nav">
		<a id="home-button" class="nav__button" href="/" data-tooltip="You are already home!" aria-label="Home">
			<div class="home__rect"></div>
			<img class="icon-home" src="../img/icons/home.svg" alt="" aria-hidden="true" />
		</a>

		<ul class="nav__list">
			<div class="nav__rect"></div>
			<li><a class="nav__link" href="/resume/">Resume</a></li>
			<li><a class="nav__link" href="/science/">Science</a></li>
			<li><a class="nav__link" href="/music/">Music</a></li>
			<li><a class="nav__link nav__link--default" href="/gallery/">Gallery</a></li>
		</ul>

		<button id="theme-toggle" class="nav__button hover-fill" aria-label="Toggle light/dark theme">
			<img class="icon-sun" src="../img/icons/sun.svg">
			<img class="icon-moon" src="../img/icons/moon.svg">
		</button>
	</nav>

	<main>
		<section>
      <div class="gallery">
        <figure class="gallery__photo gallery__photo--is-active">
          <img data-theme-dim data-object-position="50% 70%" src="../img/gallery/niagara_falls.jpg?as=webp" />
        </figure>
  
        <figure class="gallery__photo">
          <img data-theme-dim data-object-position="50% 50%" src="../img/gallery/rockies_banff.jpg?as=webp" alt="Rockies, Banff" />
        </figure>
    
        <figure class="gallery__photo">
          <img data-theme-dim data-object-position="50% 50%" src="../img/gallery/corinth_canal.jpg?as=webp" alt="Corinth Canal" />
        </figure>
      </div>
		</section>
	</main>

	<footer class="dynamic-background">
		<p><a href="https://github.com/alanjyu/alanjyu.com/blob/master/LICENSE" data-target-cover>&#169;</a> <span data-current-year></span> — Alan J. Yu</p>

		<ul class="social">
			<li class="social__item">
				<a class="social__link hover-fill hover-pulse hover-border" href="https://www.instagram.com/alanjyu/" data-target-cover>
					<img class="social__icon" src="../img/icons/social_instagram.svg" alt="Instagram" />
				</a>
			</li>
			<li class="social__item">
				<a class="social__link hover-fill hover-pulse hover-border" href="https://www.linkedin.com/in/ajyu/" data-target-cover>
					<img class="social__icon" src="../img/icons/social_linkedin.svg" alt="LinkedIn" />
				</a>
			</li>
			<li class="social__item">
				<a class="social__link hover-fill hover-pulse hover-border" href="https://github.com/alanjyu/" data-target-cover>
					<img class="social__icon" src="../img/icons/social_github.svg" alt="GitHub" />
				</a>
			</li>
			<li class="social__item">
				<a class="social__link hover-fill hover-pulse hover-border" href="https://scholar.google.ca/citations?user=4PZ4MZoAAAAJ" data-target-cover>
					<img class="social__icon" src="../img/icons/social_scholar.svg" alt="Google Scholar" />
				</a>
			</li>
		</ul>
	</footer>

	<script type="module" src="../js/main.js" charset="utf-8"></script>
	<noscript>Please enable JavaScript to ensure that the website function properly.</noscript>
	<script>document.querySelectorAll('[data-current-year]').forEach((el) => { el.textContent = new Date().getFullYear(); });</script>
</body>

</html>
