<!doctype html>
<html lang="en">

<head>
	<title>Alan Yu - Gallery</title>

	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
	<meta http-equiv="X-UA-Compatible" content="IE=edge" />
	<meta name="author" content="Alan J. Yu" />
	<meta name="description" content="Alan&apos;s personal website. Geoscience and more." />
	<meta prefix="og: https://ogp.me/ns#" property="og:title" content="Alan Yu - Gallery" />
	<meta prefix="og: https://ogp.me/ns#" property="og:url" content="https://alanjyu.com" />
	<meta prefix="og: https://ogp.me/ns#" property="og:description" content=" " />

	<link rel="icon" type="image/png" sizes="32x32" href="/src/img/favicon.ico" />
	<link rel="manifest" href="/src/site.webmanifest" />
	<link rel="preload" href="/src/fonts/basiersquare-regular-webfont.woff2" as="font" type="font/woff2" crossorigin />
	<link rel="preload" href="/src/fonts/basiercircle-medium-webfont.woff2" as="font" type="font/woff2" crossorigin />
	<!-- Set theme early to avoid flashes -->
	<script>
		(() => {
			try {
				const savedTheme = localStorage.getItem('theme');
				const systemDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
				document.documentElement.setAttribute('data-theme', savedTheme || (systemDark ? 'dark' : 'light'));
			} catch {
				document.documentElement.setAttribute('data-theme', 'light');
			}
		})();
	</script>
	<link rel="stylesheet" href="/src/css/gallery.scss" />
</head>

<body>
	<nav class="nav">
		<div class="burger">
			<div class="burger__inner"></div>
		</div>

		<a class="nav__home-btn hover-fill hover-pulse hover-border" href="/" aria-label="Home">
			<img class="icon-home" src="../img/icons/home.svg" alt="" aria-hidden="true" />
		</a>

		<ul class="nav__menu">
			<li><a href="/">Home</a></li>
			<li><a href="/resume/">Resume</a></li>
			<li><a href="/science/">Science</a></li>
			<li><a href="/stuff/">Stuff</a></li>
			<li><a href="/gallery/">Gallery</a></li>
		</ul>

		<ul class="nav__list">
			<div class="nav__rect"></div>
			<li><a href="/resume/">Resume</a></li>
			<li><a href="/science/">Science</a></li>
			<li><a href="/stuff/">Stuff</a></li>
			<li><a class="link--default" href="#">Gallery</a></li>
		</ul>

		<button class="nav__theme-btn hover-fill hover-pulse hover-border" aria-label="Toggle theme">
			<img class="icon-sun" src="../img/icons/sun.svg" alt="" aria-hidden="true" />
			<img class="icon-moon" src="../img/icons/moon.svg" alt="" aria-hidden="true" />
		</button>
	</nav>

	<main>
		<section>
			<div class="gallery">
				<h2 class="gallery__title">Gallery</h2>
				<p class="gallery__lead">A selection of field snapshots, places, and projects from research and life on the road.</p>

				<div class="gallery__grid" aria-label="Photo gallery">
					<figure class="gallery__card">
						<div class="gallery__media"><img data-theme-dim src="../img/gallery/niagara_falls.jpg?as=webp&width=1600" alt="Niagara Falls panorama" /></div>
						<figcaption class="gallery__caption">Niagara Falls, Canada</figcaption>
					</figure>

                    <figure class="gallery__card">
						<div class="gallery__media"><img data-theme-dim src="../img/gallery/rockies_banff.jpg?as=webp&width=1600" alt="Rockies, Banff" /></div>
						<figcaption class="gallery__caption">The Rockies, Canada</figcaption>
					</figure>

                    <figure class="gallery__card">
                        <div class="gallery__media"><img data-theme-dim src="../img/gallery/corinth_canal.jpg?as=webp&width=1600" alt="Corinth Canal" /></div>
                        <figcaption class="gallery__caption">Corinth Canal, Greece</figcaption>
                    </figure>
				</div>
			</div>
		</section>
	</main>

	<footer class="dynamic-background">
		<p><a href="https://github.com/alanjyu/alanjyu.com/blob/master/LICENSE" data-target-cover>&#169;</a> <span data-current-year></span> — Alan J. Yu</p>

		<ul class="social">
			<li class="social__item">
				<a class="social__link hover-fill hover-pulse hover-border" href="https://www.instagram.com/alanjyu/" data-target-cover>
					<img class="social__icon" src="../img/icons/social_instagram.svg" alt="Instagram" />
				</a>
			</li>
			<li class="social__item">
				<a class="social__link hover-fill hover-pulse hover-border" href="https://www.linkedin.com/in/ajyu/" data-target-cover>
					<img class="social__icon" src="../img/icons/social_linkedin.svg" alt="LinkedIn" />
				</a>
			</li>
			<li class="social__item">
				<a class="social__link hover-fill hover-pulse hover-border" href="https://github.com/alanjyu/" data-target-cover>
					<img class="social__icon" src="../img/icons/social_github.svg" alt="GitHub" />
				</a>
			</li>
			<li class="social__item">
				<a class="social__link hover-fill hover-pulse hover-border" href="https://scholar.google.ca/citations?user=4PZ4MZoAAAAJ" data-target-cover>
					<img class="social__icon" src="../img/icons/social_scholar.svg" alt="Google Scholar" />
				</a>
			</li>
		</ul>
	</footer>

	<script type="module" src="../js/main.js" charset="utf-8"></script>
	<noscript>Please enable JavaScript to ensure that the website function properly.</noscript>
	<script>document.querySelectorAll('[data-current-year]').forEach((el) => { el.textContent = new Date().getFullYear(); });</script>
</body>

</html>
